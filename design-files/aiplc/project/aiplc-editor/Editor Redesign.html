<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIPLC Editor — UI/UX 改版</title>
  <link rel="stylesheet" href="qp-app.css" />
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#0d1f3c" />
      <rect x="30" y="30" width="40" height="40" rx="6" fill="none" stroke="#00c2ff" stroke-width="3" />
      <rect x="42" y="42" width="16" height="16" rx="2" fill="#00c2ff" />
      <path d="M30 24v-6M50 24v-6M70 24v-6M30 82v-6M50 82v-6M70 82v-6M24 30h-6M24 50h-6M24 70h-6M82 30h-6M82 50h-6M82 70h-6" stroke="#1a4fa0" stroke-width="3" stroke-linecap="round" />
    </svg>
  </template>
  <style>
    #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--qp-bg-alt); z-index: 99; color: var(--qp-text-dim); font-family: 'Inter', sans-serif; font-size: 13px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="boot">載入 AIPLC Editor…</div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="mock-ui.jsx"></script>
  <script type="text/babel" src="mock-explorer.jsx"></script>
  <script type="text/babel" src="mock-circuit.jsx"></script>
  <script type="text/babel" src="workspace.jsx"></script>
  <script type="text/babel" src="editor-app.jsx"></script>
  <script>
    window.addEventListener('load', () => { setTimeout(() => { const b = document.getElementById('boot'); if (b) b.remove(); }, 600); });
  </script>
</body>
</html>
